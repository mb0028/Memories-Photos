name: memories_photos
description: "A new Flutter project."
publish_to: 'none'
version: 2026.07.08+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  image: ^4.9.1
  camera: ^0.12.0+1
  image_picker: ^1.2.3

  dynamic_color: ^1.8.1
  material_color_utilities: ^0.13.0
  blur: ^4.0.2
  flutter_styled_toast: ^2.3.0
  flutter_colorpicker: ^1.1.0
  photo_view: ^0.15.0

  open_filex: ^4.7.0
  filesystem_picker: ^4.1.0

  # ftp_server: ^2.3.2
  # ftpconnect: ^2.0.10
  # ip_go: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  shaders:
    - Assets/Shaders/bg.frag

  fonts:
    - family: LexendDeca
      fonts:
        - asset: Assets/LexendDeca-Thin.ttf
          weight: 700
        - asset: Assets/LexendDeca-Regular.ttf
        - asset: Assets/LexendDeca-Thin.ttf
          weight: 200
    - family: ElmsSans
      fonts:
        - asset: Assets/ElmsSans-VariableFont_wght.ttf
    - family: CherryBombOne
      fonts:
        - asset: Assets/CherryBombOne-Regular.ttf
